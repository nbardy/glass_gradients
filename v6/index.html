<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Gradients v6 - WebGPU Renderer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #0f0;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <canvas id="glcanvas"></canvas>
    <div id="status">Initializing WebGPU...</div>

    <script type="module">
        'use strict';

        const canvas = document.getElementById('glcanvas');
        const statusDiv = document.getElementById('status');

        async function initWebGPU() {
            if (!navigator.gpu) {
                statusDiv.textContent = 'ERROR: WebGPU unavailable';
                throw new Error('WebGPU unavailable');
            }

            const adapter = await navigator.gpu.requestAdapter();
            if (!adapter) {
                statusDiv.textContent = 'ERROR: No WebGPU adapter';
                throw new Error('No WebGPU adapter');
            }

            const OPTIONAL_FEATURES = [
                'shader-f16',
                'subgroups',
                'timestamp-query',
                'bgra8unorm-storage',
                'texture-formats-tier1',
                'texture-formats-tier2',
            ];

            const requiredFeatures = OPTIONAL_FEATURES.filter(f => adapter.features.has(f));

            const device = await adapter.requestDevice({
                requiredFeatures,
            });

            const context = canvas.getContext('webgpu');
            const canvasFormat = navigator.gpu.getPreferredCanvasFormat();

            context.configure({
                device,
                format: canvasFormat,
                alphaMode: 'opaque',
                colorSpace: 'display-p3',
            });

            const size = {
                width: canvas.width || window.innerWidth,
                height: canvas.height || window.innerHeight,
            };

            // Resize canvas to match display resolution
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.round(canvas.clientWidth * dpr);
            canvas.height = Math.round(canvas.clientHeight * dpr);

            statusDiv.textContent = `WebGPU ready | ${device.limits.maxComputeWorkgroupSizeX}x${device.limits.maxComputeWorkgroupSizeY} workgroup | Features: ${requiredFeatures.length}`;

            return { device, context, canvas, canvasFormat };
        }

        async function main() {
            try {
                const { device, context, canvas, canvasFormat } = await initWebGPU();

                // Create render loop
                let frameIndex = 0;
                function frame() {
                    // TODO: Implement frame rendering
                    // For now, just show status updates
                    frameIndex++;
                    if (frameIndex % 60 === 0) {
                        statusDiv.textContent = `Frame: ${frameIndex} | FPS: ${Math.round(1000 / (1000 / 60))}`;
                    }
                    requestAnimationFrame(frame);
                }

                // Start animation loop
                requestAnimationFrame(frame);

            } catch (err) {
                statusDiv.textContent = `FATAL: ${err.message}`;
                console.error(err);
            }
        }

        main();
    </script>
</body>
</html>
