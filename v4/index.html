<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytic Privacy Glass - Optical Simulator</title>
    <style>
        /*
         * Eradicate the browser's default layout engine absurdities.
         * The hardware canvas must commandeer the absolute geometry of the viewport.
         */
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #000; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="glcanvas"></canvas>

<script>
'use strict';

/**
 * ============================================================================
 * 1. HARDWARE CONTEXT ACQUISITION
 * ============================================================================
 */
const canvas = document.getElementById('glcanvas');

// We rigorously demand WebGL2. Fallbacks to WebGL1 are unacceptable given
// our requirements for strict output qualifiers and precise floating-point semantics.
const gl = canvas.getContext('webgl2', {
    antialias: false,
    depth: false,
    powerPreference: "high-performance"
});

if (!gl) {
    document.body.innerHTML = '<h1 style="color:#ff3333; font-family:sans-serif; text-align:center; padding-top:20vh;">FATAL ERROR: Your hardware or browser is too primitive to instantiate a WebGL 2.0 state machine.</h1>';
    throw new Error("WebGL 2.0 Context Initialization Failed.");
}

/**
 * ============================================================================
 * 2. PROCEDURAL VERTEX SHADER (Zero-Bandwidth Projection)
 * ============================================================================
 * This algorithmically covers the Normalized Device Coordinates [-1, 1] by
 * generating a single circumscribing triangle based on the vertex invocation ID.
 * Bypasses standard VBO memory transfers entirely.
 */
const vsSource = `#version 300 es
void main() {
    float x = -1.0 + float((gl_VertexID & 1) << 2);
    float y = -1.0 + float((gl_VertexID & 2) << 1);
    gl_Position = vec4(x, y, 0.0, 1.0);
}
`;

/**
 * ============================================================================
 * 3. THE OPTICAL FRAGMENT KERNEL
 * ============================================================================
 * The exact continuous convolution model I derived for you previously,
 * wrapped in the explicit I/O requirements of the WebGL 2.0 specification.
 */
const fsSource = `#version 300 es
precision highp float;

uniform vec3 iResolution;
uniform float iTime;

// WebGL2 requires explicit output target declaration
out vec4 O_fragColor;

// --- SIGNAL GENERATION: HIGH-FREQUENCY MICRO-TOPOGRAPHY ---
vec2 hash22(vec2 p) {
    p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
    return fract(sin(p) * 43758.5453123);
}

float smoothVoronoi(vec2 x) {
    vec2 n = floor(x);
    vec2 f = fract(x);
    float res = 0.0;
    for(int j = -1; j <= 1; j++) {
        for(int i = -1; i <= 1; i++) {
            vec2 g = vec2(float(i), float(j));
            vec2 r = g - f + hash22(n + g);
            float d = dot(r, r);
            res += exp(-12.0 * d);
        }
    }
    return -(1.0 / 12.0) * log(res);
}

float evaluateGlassRelief(vec2 uv) {
    float h1 = smoothVoronoi(uv * 12.0);
    float h2 = smoothVoronoi(uv * 28.0 + vec2(10.0, 15.0));
    float h3 = smoothVoronoi(uv * 55.0 - vec2(30.0, 15.0));
    float macro = sin(uv.x * 2.0 + iTime * 0.1) * cos(uv.y * 3.0) * 0.1;
    return (h1 * 0.6 + h2 * 0.3 + h3 * 0.1) * 0.08 + macro;
}

// --- DOMAIN DECOUPLING: INCIDENT RADIANCE FIELD ---
vec3 sampleSkyRadiance(vec3 dir) {
    float elevation = dir.y;
    vec3 zenith   = vec3(0.12, 0.14, 0.45);
    vec3 midSky   = vec3(0.60, 0.30, 0.55);
    vec3 horizon  = vec3(0.95, 0.50, 0.15);
    vec3 ground   = vec3(0.02, 0.02, 0.04);

    vec3 sky = mix(midSky, zenith, smoothstep(0.0, 0.5, elevation));
    sky = mix(horizon, sky, smoothstep(-0.1, 0.15, elevation));
    sky = mix(ground, sky, smoothstep(-0.2, -0.05, elevation));

    vec3 sunDir = normalize(vec3(0.4, 0.08, 1.0));
    float mu = max(dot(dir, sunDir), 0.0);
    float sunLobe = pow(mu, 40.0) * 3.0;

    sky += vec3(1.0, 0.85, 0.6) * sunLobe;

    float clouds = sin(dir.x * 4.0) * cos(dir.y * 6.0 - dir.x * 3.0);
    sky *= mix(1.0, 0.5, smoothstep(0.0, 1.0, clouds) * smoothstep(0.1, -0.1, elevation));

    return max(sky, 0.0);
}

// --- THE INTEGRATION LOOP ---
void mainImage( out vec4 fragColor, in vec2 fragCoord ) {
    vec2 aspectUV = (fragCoord.xy - 0.5 * iResolution.xy) / iResolution.y;
    vec3 viewDir = normalize(vec3(aspectUV * 0.05, 1.0));

    vec2 e = vec2(0.005, 0.0);
    float h  = evaluateGlassRelief(aspectUV);
    float hx = evaluateGlassRelief(aspectUV + e.xy);
    float hy = evaluateGlassRelief(aspectUV + e.yx);
    vec3 macroNormal = normalize(vec3(h - hx, h - hy, e.x));

    float etaR = 1.0 / 1.48;
    float etaG = 1.0 / 1.51;
    float etaB = 1.0 / 1.54;

    vec3 color = vec3(0.0);
    const int SAMPLES = 32;
    float microRoughness = 0.08;
    const float GOLDEN_ANGLE = 2.39996323;

    for(int i = 0; i < SAMPLES; i++) {
        float t = float(i) / float(SAMPLES);
        float r = sqrt(t) * microRoughness;
        float theta = float(i) * GOLDEN_ANGLE;
        vec2 offset = vec2(cos(theta), sin(theta)) * r;

        vec3 microN = normalize(macroNormal + vec3(offset, 0.0));

        vec3 rR = refract(viewDir, microN, etaR);
        vec3 rG = refract(viewDir, microN, etaG);
        vec3 rB = refract(viewDir, microN, etaB);

        // Total Internal Reflection (TIR) Energy Recycling
        if(dot(rR, rR) < 0.01) rR = reflect(viewDir, microN);
        if(dot(rG, rG) < 0.01) rG = reflect(viewDir, microN);
        if(dot(rB, rB) < 0.01) rB = reflect(viewDir, microN);

        color.r += sampleSkyRadiance(rR).r;
        color.g += sampleSkyRadiance(rG).g;
        color.b += sampleSkyRadiance(rB).b;
    }

    color /= float(SAMPLES);

    float R0 = 0.04;
    float cosTheta = max(dot(-viewDir, vec3(0.0, 0.0, -1.0)), 0.0);
    float F = R0 + (1.0 - R0) * pow(1.0 - cosTheta, 5.0);
    color = mix(color, vec3(0.01, 0.01, 0.015), F);

    color = (color * (2.51 * color + 0.03)) / (color * (2.43 * color + 0.59) + 0.14);

    float dither = fract(sin(dot(fragCoord, vec2(12.9898, 78.233))) * 43758.5453);
    color += (dither - 0.5) / 255.0;

    fragColor = vec4(clamp(color, 0.0, 1.0), 1.0);
}

void main() {
    mainImage(O_fragColor, gl_FragCoord.xy);
}
`;

/**
 * ============================================================================
 * 4. COMPILATION AND LINKING PIPELINE
 * ============================================================================
 */
function compileShader(type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error("SHADER COMPILATION FATALITY:\n", gl.getShaderInfoLog(shader));
        gl.deleteShader(shader);
        return null;
    }
    return shader;
}

const vertexShader = compileShader(gl.VERTEX_SHADER, vsSource);
const fragmentShader = compileShader(gl.FRAGMENT_SHADER, fsSource);

const program = gl.createProgram();
gl.attachShader(program, vertexShader);
gl.attachShader(program, fragmentShader);
gl.linkProgram(program);

if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
    console.error("PROGRAM LINKING FATALITY:\n", gl.getProgramInfoLog(program));
    throw new Error("Shader program failed to link. Inspect your console.");
}

gl.useProgram(program);

/**
 * ============================================================================
 * 5. MEMORY POINTERS AND DISPLAY SYNCHRONIZATION
 * ============================================================================
 */
const iResolutionLoc = gl.getUniformLocation(program, "iResolution");
const iTimeLoc = gl.getUniformLocation(program, "iTime");

function resizeCanvas() {
    // We strictly sample the hardware's physical pixel density.
    // Rendering an analytical shader at CSS resolution on a Retina display
    // is a mathematical crime that annihilates the Nyquist frequency of our noise.
    const dpr = window.devicePixelRatio || 1;
    const width = Math.round(canvas.clientWidth * dpr);
    const height = Math.round(canvas.clientHeight * dpr);

    if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
        gl.viewport(0, 0, width, height);
    }
}

/**
 * ============================================================================
 * 6. ASYNCHRONOUS TEMPORAL LOOP
 * ============================================================================
 */
function render(timestamp) {
    resizeCanvas();

    // Transmit CPU state across the bus to GPU registers
    gl.uniform3f(iResolutionLoc, canvas.width, canvas.height, 1.0);
    gl.uniform1f(iTimeLoc, timestamp * 0.001); // Milliseconds to seconds

    // Execute the draw call: 1 instance, 3 vertices (our mathematical triangle)
    gl.drawArrays(gl.TRIANGLES, 0, 3);

    // Yield to the browser's compositor
    requestAnimationFrame(render);
}

// Ignite the engine
requestAnimationFrame(render);

</script>
</body>
</html>
