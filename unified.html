<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Glass Gradients - Unified Renderer</title>
    <link rel="stylesheet" href="./lib/dense-controls/dense-controls.css" />
    <link rel="stylesheet" href="./styles-unified.css" />
  </head>
  <body>
    <header>
      <h1>Glass Gradients</h1>
      <div style="display: flex; gap: 12px; align-items: center;">
        <select id="view-mode">
          <option value="full">Full View</option>
          <option value="split">Split View</option>
        </select>
        <select id="algo-picker"></select>
      </div>
    </header>

    <main>
      <div id="canvas-container">
        <canvas id="canvas" width="720" height="720"></canvas>
        <div id="debug-container" style="display: none; flex-direction: column; gap: 12px; height: 720px;">
          <canvas id="debug-r" width="232" height="232" style="flex: 1; background: #000; border-radius: 8px;"></canvas>
          <canvas id="debug-g" width="232" height="232" style="flex: 1; background: #000; border-radius: 8px;"></canvas>
          <canvas id="debug-b" width="232" height="232" style="flex: 1; background: #000; border-radius: 8px;"></canvas>
        </div>
      </div>

      <aside>
        <!-- Controls form (DenseControls transforms at init) -->
        <form id="controls"></form>

        <!-- Error display -->
        <div id="error"></div>

        <!-- Stats display (populated by render loop) -->
        <div id="stats-panel"></div>
      </aside>
    </main>

    <script src="./app.bundle.js" type="module"></script>
  </body>
</html>
