<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Glass Gradients - Unified Renderer</title>
    <link rel="stylesheet" href="./lib/dense-controls/dense-controls.css" />
    <link rel="stylesheet" href="./styles-unified.css" />
  </head>
  <body>
    <header>
      <h1>Glass Gradients</h1>
      <div style="display: flex; gap: 12px; align-items: center;">
        <select id="view-mode">
          <option value="full">Full View</option>
          <option value="split">Split View</option>
        </select>
        <select id="algo-picker"></select>
      </div>
    </header>

    <main>
      <div id="canvas-container">
        <!-- Left: Background -->
        <div id="debug-left" class="debug-pane" style="display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
          <div class="split-title" style="margin-bottom: 8px;">Background</div>
          <canvas id="debug-bg" width="512" height="512" style="width: 100%; aspect-ratio: 1; border-radius: 8px; background: #000;"></canvas>
        </div>
        
        <!-- Middle: Main Render -->
        <div style="flex: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
          <div id="debug-main-title" class="split-title" style="display: none; margin-bottom: 8px;">Final Render</div>
          <canvas id="canvas" width="720" height="720" style="width: 100%; aspect-ratio: 1; object-fit: contain; border-radius: 8px;"></canvas>
        </div>

        <!-- Right: 3 G-Buffer maps -->
        <div id="debug-right" class="debug-pane" style="display: none; flex: 1; flex-direction: column; gap: 8px; height: 100%;">
          <div style="flex: 1; display: flex; flex-direction: column; min-height: 0; align-items: center;">
            <div class="split-title" style="font-size: 12px; margin-bottom: 4px;">Normal</div>
            <canvas id="debug-r" width="512" height="512" style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px; background: #000;"></canvas>
          </div>
          <div style="flex: 1; display: flex; flex-direction: column; min-height: 0; align-items: center;">
            <div class="split-title" style="font-size: 12px; margin-bottom: 4px;">Roughness</div>
            <canvas id="debug-g" width="512" height="512" style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px; background: #000;"></canvas>
          </div>
          <div style="flex: 1; display: flex; flex-direction: column; min-height: 0; align-items: center;">
            <div class="split-title" style="font-size: 12px; margin-bottom: 4px;">Height</div>
            <canvas id="debug-b" width="512" height="512" style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px; background: #000;"></canvas>
          </div>
        </div>
      </div>

      <aside>
        <!-- Controls form (DenseControls transforms at init) -->
        <form id="controls"></form>

        <!-- Error display -->
        <div id="error"></div>

        <!-- Stats display (populated by render loop) -->
        <div id="stats-panel"></div>
      </aside>
    </main>

    <script src="./app.bundle.js" type="module"></script>
  </body>
</html>
